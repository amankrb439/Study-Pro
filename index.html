<!doctype html>
<html lang="en">
  <head>
    <script>
      // Prevent ResizeObserver and cross-origin "Script error." from bubbling up to the AI Studio platform error tracker
      const originalOnError = window.onerror;
      window.onerror = function(msg, url, line, col, err) {
        const errorText = String(msg || "").toLowerCase();
        if (errorText.includes('resizeobserver') || errorText.includes('script error') || errorText === '') {
          return true;
        }
        if (originalOnError) {
          return originalOnError.apply(this, arguments);
        }
        return false;
      };
      
      const originalConsoleError = console.error;
      console.error = function(...args) {
        if (args && args.length > 0) {
          const fullMessage = args.map(arg => {
            if (arg instanceof Error) {
              return String(arg.message || "") + " " + String(arg.stack || "");
            }
            return String(arg || "");
          }).join(" ").toLowerCase();
          
          if (fullMessage.includes('resizeobserver') || fullMessage.includes('script error')) {
            return;
          }
        }
        originalConsoleError.apply(this, args);
      };

      window.addEventListener('error', function(e) {
        const errorText = String(e.message || "").toLowerCase();
        if (errorText.includes('resizeobserver') || errorText.includes('script error') || errorText === '') {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        const reasonText = String(e.reason?.message || e.reason || "").toLowerCase();
        if (reasonText.includes('resizeobserver') || reasonText.includes('script error')) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>ExamShip Elite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
